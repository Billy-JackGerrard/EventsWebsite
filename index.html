<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme: apply saved theme/mode before first paint to prevent flash -->
    <meta name="theme-color" content="#1d4ed8" />
    <script>
      (function(){
        var t=localStorage.getItem('bsl-theme');
        var m=localStorage.getItem('bsl-color-mode');
        if(t&&t!=='classic')document.documentElement.setAttribute('data-theme',t);
        var dark=m==='dark'||(m!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches);
        if(dark)document.documentElement.setAttribute('data-dark','');
        // Update theme-color meta to match theme
        var colors={classic:['#1d4ed8','#1e3a8a'],ocean:['#38D9D9','#1A8A8A'],ember:['#E85D04','#9A3412']};
        var c=colors[t]||colors.classic;
        document.querySelector('meta[name="theme-color"]').setAttribute('content',c[dark?1:0]);
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/emoji/48/love-you-gesture-emoji.png" />

    <!-- Primary meta -->
    <title>Edinburgh BSL Community Events</title>
    <meta name="description" content="A community calendar for BSL and Deaf events in Edinburgh. Find classes, social meetups, performances, and more." />

    <!-- Open Graph (link previews in Slack, WhatsApp, etc.) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Edinburgh BSL Community Events" />
    <meta property="og:description" content="A community calendar for BSL and Deaf events in Edinburgh. Find classes, social meetups, performances, and more." />
    <meta property="og:locale"      content="en_GB" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Edinburgh BSL Community Events" />
    <meta name="twitter:description" content="A community calendar for BSL and Deaf events in Edinburgh." />

    <!-- Fonts: Inter (body) + Plus Jakarta Sans (display headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
