<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary meta -->
    <title>Edinburgh BSL Community Events</title>
    <meta name="description" content="A community calendar for BSL and Deaf events in Edinburgh. Find classes, social meetups, performances, and more." />

    <!-- Open Graph (link previews in Slack, WhatsApp, etc.) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Edinburgh BSL Community Events" />
    <meta property="og:description" content="A community calendar for BSL and Deaf events in Edinburgh. Find classes, social meetups, performances, and more." />
    <meta property="og:locale"      content="en_GB" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Edinburgh BSL Community Events" />
    <meta name="twitter:description" content="A community calendar for BSL and Deaf events in Edinburgh." />

    <!-- Fonts: Inter (body) + Plus Jakarta Sans (display headings) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
